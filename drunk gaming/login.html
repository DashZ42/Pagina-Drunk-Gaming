<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Drunk-Gaming</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="logo-login">
                <div class="logo-icon">DG</div>
                <span>DRUNK-GAMING</span>
            </a>
            
            <h2>Iniciar Sesión</h2>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Usuario o Email</label>
                    <input type="text" id="loginUser" required placeholder="Ingresa tu usuario">
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPass" required placeholder="Ingresa tu contraseña">
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Recordarme</span>
                    </label>
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn btn-register btn-full">Ingresar</button>
            </form>
            
            <div class="login-footer">
                <p>¿No tienes cuenta? <a href="register.html">Crear una cuenta</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
