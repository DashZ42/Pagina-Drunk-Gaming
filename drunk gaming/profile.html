<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Drunk-Gaming</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            margin: 0 auto 1rem;
            border: 4px solid var(--primary-color);
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">DG</div>
                <span>DRUNK-GAMING</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">🏠 Inicio</a></li>
                <li><a href="index.html#servidores">🎮 Servidores</a></li>
            </ul>
        </div>
        <div class="nav-right" id="navRight">
            <!-- Se carga dinámicamente -->
        </div>
    </nav>

    <main class="main-content">
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatar">U</div>
            <h1 id="profileUsername">Usuario</h1>
            <p id="profileEmail" style="color: var(--text-secondary);">email@ejemplo.com</p>
            <div style="margin-top: 1rem;">
                <span id="profileRank" style="background: var(--primary-color); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem;">
                    Usuario
                </span>
            </div>
        </div>

        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-value" id="statNotifications">0</div>
                <div class="stat-label">Notificaciones</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statMessages">0</div>
                <div class="stat-label">Mensajes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statJoined">Hoy</div>
                <div class="stat-label">Miembro desde</div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // Cargar datos del perfil
        document.addEventListener('DOMContentLoaded', function() {
            fetch('php/check_session.php')
                .then(response => response.json())
                .then(data => {
                    if (data.loggedIn) {
                        document.getElementById('profileUsername').textContent = data.user.username;
                        document.getElementById('profileEmail').textContent = data.user.email;
                        document.getElementById('profileAvatar').textContent = data.user.username.charAt(0).toUpperCase();
                        
                        if (data.user.is_admin == 1) {
                            document.getElementById('profileRank').textContent = 'Administrador';
                            document.getElementById('profileRank').style.background = 'var(--danger)';
                        }
                        
                        // Cargar estadísticas
                        loadProfileStats();
                    } else {
                        window.location.href = 'login.html';
                    }
                });
        });
        
        function loadProfileStats() {
            fetch('php/get_notifications.php')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('statNotifications').textContent = data.notifications.length;
                    }
                });
                
            fetch('php/get_messages.php')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('statMessages').textContent = data.messages.length;
                    }
                });
        }
    </script>
</body>
</html>
